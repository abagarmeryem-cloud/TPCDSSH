name: CI/CD Flask Docker

on:
    push:
        branches:
            - main
jobs:
    cd:
        name: Docker Build & Deploy
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
            - name: Set up Docker
              uses: docker/setup-buildx-action@v2
            - name: Login Docker Hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Build and push Docker image
              run: |
                docker build -t devmery/flask_devops_demo:latest .
                docker push devmery/flask_devops_demo:latest
            - name: Deploy via SSH
              run: |
                echo "${{ secrets.SSH_KEY }}" > key.pem
                chmod 600 key.pem
                ssh -i key.pem -o StrictHostKeyChecking=no "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
                "powershell -ExecutionPolicy Bypass -File 'C:\\Users\\abaga\\deploy.ps1' -DockerUser ${{ secrets.DOCKER_USERNAME }}
                -DockerToken ${{ secrets.DOCKER_PASSWORD }}"